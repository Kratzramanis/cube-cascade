<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kubus-Kaskade – RVT v16 (RNG nur für 3. Welle)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.8);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.4;
      border: 1px solid #334;
    }
  </style>
</head>
<body>
  <div id="info">
    <strong>RVT v16 – RNG nur für 3. Welle</strong><br/>
    • Ur-Tetraeder (weiß, intransparent)<br/>
    • 6 orange Kuben (transparent 0.3)<br/>
    • 6 grüne Tetraeder (transparent 0.5)<br/>
    • 6 rote Kuben (intransparent)<br/>
    • 3. Welle: RNG-Färbung (intransparent)
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020208);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(10, 20, 15);
    scene.add(dirLight);

    let dynamicMeshes = [];
    let animationQueue = [];
    let time = 0;
    let lastExecutionTime = 0;
    let resetTimer = null;
    let cycleCount = 0;

    function getRandomColor() {
      return Math.floor(Math.random() * 0xffffff);
    }

    function createTetraMesh(points, color, opacity = 1.0) {
      const geom = new THREE.BufferGeometry();
      const vertices = new Float32Array([
        ...points[0], ...points[1], ...points[2],
        ...points[0], ...points[1], ...points[3],
        ...points[0], ...points[2], ...points[3],
        ...points[1], ...points[2], ...points[3],
      ]);
      geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geom.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({
        color, transparent: opacity < 1.0, opacity, side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geom, mat);
      scene.add(mesh);
      dynamicMeshes.push(mesh);
      return mesh;
    }

    function getOrthogonalVector(v) {
      const ortho = new THREE.Vector3();
      if (Math.abs(v.x) < 0.5) ortho.set(1, 0, 0);
      else if (Math.abs(v.y) < 0.5) ortho.set(0, 1, 0);
      else ortho.set(0, 0, 1);
      return ortho.cross(v).normalize();
    }

    function tetraVolume(a, b, c, d) {
      const ab = new THREE.Vector3().subVectors(b, a);
      const ac = new THREE.Vector3().subVectors(c, a);
      const ad = new THREE.Vector3().subVectors(d, a);
      return Math.abs(ab.dot(ac.cross(ad))) / 6;
    }

    function generateNewTetraEdges() {
      const newEdges = [];
      const baseLength = 1.0 + Math.random() * 0.5;
      for (let i = 0; i < 6; i++) {
        newEdges.push(baseLength + (Math.random() * 0.3 - 0.15));
      }
      return newEdges;
    }

    function buildCubeOnEdge(pA, pB, colorRGB, opacity = 1.0) {
      const edgeVec = new THREE.Vector3().subVectors(pB, pA);
      const length = edgeVec.length();
      const dir = edgeVec.clone().normalize();

      const ortho1 = getOrthogonalVector(dir);
      const ortho2 = new THREE.Vector3().crossVectors(dir, ortho1).normalize();

      const geom = new THREE.BoxGeometry(length, length, length);
      const mat = new THREE.MeshPhongMaterial({
        color: colorRGB, transparent: opacity < 1.0, opacity
      });
      const cube = new THREE.Mesh(geom, mat);

      const matrix = new THREE.Matrix4().makeBasis(dir, ortho1, ortho2);
      cube.quaternion.setFromRotationMatrix(matrix);

      const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
      const shift = new THREE.Vector3()
        .addScaledVector(ortho1, length / 2)
        .addScaledVector(ortho2, length / 2);
      cube.position.copy(mid).add(shift);
      
      scene.add(cube);
      dynamicMeshes.push(cube);

      const outerMid = mid.clone().add(shift.clone().multiplyScalar(2));
      const outerA = outerMid.clone().addScaledVector(dir, -length / 2);
      const outerB = outerMid.clone().addScaledVector(dir, length / 2);

      return { outerA, outerB, length, dir, ortho1, ortho2 };
    }

    function initCascade() {
      dynamicMeshes.forEach(mesh => { scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); });
      dynamicMeshes = [];
      animationQueue = [];
      resetTimer = null;

      cycleCount++;

      let P1, P2, P3, P4;
      if (cycleCount === 1) {
        P1 = [0.0, 1.4, 0.2];
        P2 = [-1.6, -0.5, 0.1];
        P3 = [1.3, -0.9, -0.6];
        P4 = [0.4, -0.1, 1.7];
      } else {
        const newEdges = generateNewTetraEdges();
        P1 = [0, 0, 0];
        P2 = [newEdges[0], 0, 0];
        P3 = [newEdges[1] * Math.cos(Math.PI/3), newEdges[1] * Math.sin(Math.PI/3), 0];
        P4 = [0, newEdges[2], newEdges[3]];
      }

      const vP1 = new THREE.Vector3(...P1);
      const vP2 = new THREE.Vector3(...P2);
      const vP3 = new THREE.Vector3(...P3);
      const vP4 = new THREE.Vector3(...P4);

      const urVolume = tetraVolume(vP1, vP2, vP3, vP4);
      console.log(`Zyklus ${cycleCount}: Ur-Volumen = ${urVolume.toFixed(3)}`);

      const geom = new THREE.BufferGeometry();
      const vertices = new Float32Array([
        ...P1, ...P2, ...P3,
        ...P1, ...P2, ...P4,
        ...P1, ...P3, ...P4,
        ...P2, ...P3, ...P4,
      ]);
      geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geom.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: false, opacity: 1.0, side: THREE.DoubleSide });
      const urMesh = new THREE.Mesh(geom, mat);
      scene.add(urMesh);
      dynamicMeshes.push(urMesh);

      const urEdges = [
        [vP1, vP2], [vP1, vP3], [vP1, vP4],
        [vP2, vP3], [vP2, vP4], [vP3, vP4]
      ];

      urEdges.forEach((edge, index) => {
        animationQueue.push({ type: 'CUBE_GEN1', edgeIndex: index, data: { a: edge[0], b: edge[1], volume: urVolume } });
      });
    }

    function executeNextCascadeStep() {
      if (animationQueue.length === 0) return;
      const step = animationQueue.shift();

      if (step.type === 'CUBE_GEN1') {
        const cubeData = buildCubeOnEdge(step.data.a, step.data.b, 0xff8800, 0.3);
        animationQueue.push({ type: 'TETRA_GEN2', edgeIndex: step.edgeIndex, data: { ...cubeData, volume: step.data.volume } });

      } else if (step.type === 'TETRA_GEN2') {
        const cD = step.data;
        const stretchFactor = 1.3; 
        const d1 = cD.length * stretchFactor;
        
        const tetraP3 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).addScaledVector(cD.ortho1, d1);
        const height = (6 * cD.volume) / (cD.length * d1);
        const tetraP4 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).addScaledVector(cD.ortho2, height);

        createTetraMesh([
          [cD.outerA.x, cD.outerA.y, cD.outerA.z],
          [cD.outerB.x, cD.outerB.y, cD.outerB.z],
          [tetraP3.x, tetraP3.y, tetraP3.z],
          [tetraP4.x, tetraP4.y, tetraP4.z]
        ], 0x00ff00, 0.5);

        animationQueue.push({ type: 'CUBE_GEN2', edgeIndex: step.edgeIndex, data: { a: tetraP3, b: tetraP4, volume: cD.volume } });

      } else if (step.type === 'CUBE_GEN2') {
        const cubeData = buildCubeOnEdge(step.data.a, step.data.b, 0xff4444, 1.0);
        animationQueue.push({ type: 'TETRA_GEN3', edgeIndex: step.edgeIndex, data: { ...cubeData, volume: step.data.volume } });
      }
      else if (step.type === 'TETRA_GEN3') {
        const cD = step.data;
        const stretchFactor = 1.2;
        const d1 = cD.length * stretchFactor;
        
        const tetraP3 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).addScaledVector(cD.ortho1, d1);
        const height = (6 * cD.volume) / (cD.length * d1);
        const tetraP4 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).addScaledVector(cD.ortho2, height);

        createTetraMesh([
          [cD.outerA.x, cD.outerA.y, cD.outerA.z],
          [cD.outerB.x, cD.outerB.y, cD.outerB.z],
          [tetraP3.x, tetraP3.y, tetraP3.z],
          [tetraP4.x, tetraP4.y, tetraP4.z]
        ], getRandomColor(), 1.0);
        
        const cubeData = buildCubeOnEdge(tetraP3, tetraP4, getRandomColor(), 1.0);
      }
    }

    initCascade();
    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      if (time - lastExecutionTime > 0.6) {
        if (animationQueue.length > 0) {
          executeNextCascadeStep();
          lastExecutionTime = time;
        } else {
          if (resetTimer === null) {
            resetTimer = time + 3.0;
          }
          if (time > resetTimer) {
            initCascade();
          }
        }
      }

      const radius = 22;
      camera.position.x = Math.cos(time * 0.3) * radius;
      camera.position.z = Math.sin(time * 0.3) * radius;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

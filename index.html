<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kubus-Kaskade – RVT v16</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="info">
    Kubus-Kaskade (RVT v16)<br/>
    Ur-Tetraeder mit 6 ungleichen Kanten<br/>
    Öffne die Browser-Konsole für Kantenlängen.
  </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Szene, Kamera, Renderer
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 2.5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Licht
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Hilfsfunktion: Tetraeder aus vier Punkten
    function createTetra(points, color = 0xffcc00) {
      const geom = new THREE.BufferGeometry();
      const vertices = new Float32Array([
        ...points[0], ...points[1], ...points[2],
        ...points[0], ...points[1], ...points[3],
        ...points[0], ...points[2], ...points[3],
        ...points[1], ...points[2], ...points[3],
      ]);
      geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geom.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geom, mat);
      scene.add(mesh);
      return { mesh, points };
    }

    // Hilfsfunktion: Kubus entlang einer Kante
    function createCubeFromEdge(pA, pB, color = 0x3399ff, scale = 1.0) {
      const edge = new THREE.Vector3().subVectors(
        new THREE.Vector3(...pB),
        new THREE.Vector3(...pA)
      );
      const length = edge.length();
      const cubeGeom = new THREE.BoxGeometry(length * scale, length * scale, length * scale);
      const cubeMat = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity: 0.35,
      });
      const cube = new THREE.Mesh(cubeGeom, cubeMat);

      // Mittelpunkt der Kante
      const mid = new THREE.Vector3()
        .addVectors(new THREE.Vector3(...pA), new THREE.Vector3(...pB))
        .multiplyScalar(0.5);

      cube.position.copy(mid);

      // Ausrichtung: Kantenrichtung als x-Achse
      const dir = edge.clone().normalize();
      const quat = new THREE.Quaternion().setFromUnitVectors(
        new THREE.Vector3(1, 0, 0),
        dir
      );
      cube.quaternion.copy(quat);

      scene.add(cube);
      return cube;
    }

    // Ungleichseitiges Ur-Tetraeder (alle Kanten verschieden)
    const P1 = [0.0, 1.4, 0.2];
    const P2 = [-1.6, -0.5, 0.1];
    const P3 = [1.3, -0.9, -0.6];
    const P4 = [0.4, -0.1, 1.7];

    const urTetra = createTetra([P1, P2, P3, P4], 0xffcc00);

    // Kantenliste
    const edges = [
      [P1, P2],
      [P1, P3],
      [P1, P4],
      [P2, P3],
      [P2, P4],
      [P3, P4],
    ];

    // Kantenlängen berechnen und ausgeben
    console.log("Kantenlängen des Ur-Tetraeders:");
    edges.forEach(([a, b], i) => {
      const vA = new THREE.Vector3(...a);
      const vB = new THREE.Vector3(...b);
      const len = vA.distanceTo(vB);
      console.log(`Kante ${i+1}: Länge = ${len.toFixed(3)}`);
    });

    // Animations-Kaskade
    let cubes = [];
    let step = 0;
    let time = 0;

    function spawnNextCubeAndTetra() {
      if (step >= edges.length) return;

      const [a, b] = edges[step];
      const cube = createCubeFromEdge(a, b, 0x3399ff, 0.7);
      cubes.push(cube);

      // Folge-Tetraeder: Basis-Kante = a–b, restliche Punkte leicht versetzt
      const baseA = new THREE.Vector3(...a);
      const baseB = new THREE.Vector3(...b);
      const axis = new THREE.Vector3().subVectors(baseB, baseA).normalize();

      // Punkt P3' auf einer Parallelfläche
      const normal = new THREE.Vector3(0, 1, 0).cross(axis).normalize();
      const P3p = baseA.clone()
        .add(axis.clone().multiplyScalar(0.4))
        .add(normal.clone().multiplyScalar(0.7));

      // Punkt P4' „oben“ über der Fläche
      const P4p = baseA.clone()
        .add(axis.clone().multiplyScalar(0.2))
        .add(normal.clone().multiplyScalar(0.3))
        .add(new THREE.Vector3(0, 0.9, 0));

      const folgeTetra = createTetra(
        [
          [baseA.x, baseA.y, baseA.z],
          [baseB.x, baseB.y, baseB.z],
          [P3p.x, P3p.y, P3p.z],
          [P4p.x, P4p.y, P4p.z],
        ],
        0x66ff66
      );

      // Leicht nach außen verschieben, damit man die Generationen sieht
      folgeTetra.mesh.position.add(
        new THREE.Vector3(0, 0, step * 0.4)
      );

      step++;
    }

    // Erstes Paar Kubus + Folge-Tetraeder
    spawnNextCubeAndTetra();

    // Animation
    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // Kamera langsam um das System drehen
      const radius = 8;
      camera.position.x = Math.cos(time * 0.3) * radius;
      camera.position.z = Math.sin(time * 0.3) * radius;
      camera.lookAt(0, 0, 0);

      // Kuben leicht pulsieren
      cubes.forEach((cube, i) => {
        const s = 1 + 0.1 * Math.sin(time * 2 + i);
        cube.scale.set(s, s, s);
        cube.rotation.y += 0.01;
      });

      // Alle ~2 Sekunden nächste Generation erzeugen
      if (time > 2 * step && step < edges.length) {
        spawnNextCubeAndTetra();
      }

      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kubus-Kaskade – RVT v16 (Echte Flach-Scherung & Farb-Umschlüsselung)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.8);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.4;
      border: 1px solid #334;
    }
  </style>
</head>
<body>
  <div id="info">
    <strong>RVT v16 – Farb- & Scherungs-Kalibrierung</strong><br/>
    • Tetraeder Gen 2: Grün | Gen 3 & 4: Übersetzte Grüntöne<br/>
    • Kuben ab Gen 3: **Absolutes RNG-Farbspektrum**<br/>
    • **Scherung:** Spitzenpunkt $P_4$ flach im echten 45°-Winkel über der Kubusfläche fixiert.
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020208);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 30);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 15);
    scene.add(dirLight);

    let dynamicMeshes = [];
    let animationQueue = [];
    let time = 0;
    let lastExecutionTime = 0;
    let resetTimer = null;
    let cycleCount = 0;
    let targetUrVolume = null;

    function getRandomColor() {
      return Math.floor(Math.random() * 0xffffff);
    }

    function getCentroid(p1, p2, p3, p4) {
      return new THREE.Vector3(0, 0, 0).add(p1).add(p2).add(p3).add(p4).multiplyScalar(0.25);
    }

    function createTetraMesh(points, color, opacity = 1.0) {
      const geom = new THREE.BufferGeometry();
      const vertices = new Float32Array([
        ...points[0], ...points[1], ...points[2],
        ...points[0], ...points[1], ...points[3],
        ...points[0], ...points[2], ...points[3],
        ...points[1], ...points[2], ...points[3],
      ]);
      geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geom.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({
        color, transparent: opacity < 1.0, opacity, side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geom, mat);
      scene.add(mesh);
      dynamicMeshes.push(mesh);
      return mesh;
    }

    function getOrthogonalVector(v) {
      const ortho = new THREE.Vector3();
      if (Math.abs(v.x) < 0.5) ortho.set(1, 0, 0);
      else if (Math.abs(v.y) < 0.5) ortho.set(0, 1, 0);
      else ortho.set(0, 0, 1);
      return ortho.cross(v).normalize();
    }

    function tetraVolume(a, b, c, d) {
      const ab = new THREE.Vector3().subVectors(b, a);
      const ac = new THREE.Vector3().subVectors(c, a);
      const ad = new THREE.Vector3().subVectors(d, a);
      return Math.abs(ab.dot(ac.cross(ad))) / 6;
    }

    function buildCubeOnEdge(pA, pB, parentCentroid, colorRGB, opacity = 1.0) {
      const edgeVec = new THREE.Vector3().subVectors(pB, pA);
      const length = edgeVec.length();
      const dir = edgeVec.clone().normalize();

      const ortho1 = getOrthogonalVector(dir);
      const ortho2 = new THREE.Vector3().crossVectors(dir, ortho1).normalize();

      const geom = new THREE.BoxGeometry(length, length, length);
      const mat = new THREE.MeshPhongMaterial({
        color: colorRGB, transparent: opacity < 1.0, opacity
      });
      const cube = new THREE.Mesh(geom, mat);

      const matrix = new THREE.Matrix4().makeBasis(dir, ortho1, ortho2);
      cube.quaternion.setFromRotationMatrix(matrix);

      const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
      
      let shift = new THREE.Vector3()
        .addScaledVector(ortho1, length / 2)
        .addScaledVector(ortho2, length / 2);

      const toCentroid = new THREE.Vector3().subVectors(parentCentroid, mid);
      if (shift.dot(toCentroid) > 0) {
        shift.multiplyScalar(-1);
      }

      cube.position.copy(mid).add(shift);
      scene.add(cube);
      dynamicMeshes.push(cube);

      const outerMid = mid.clone().add(shift.clone().multiplyScalar(2));
      const outerA = outerMid.clone().addScaledVector(dir, -length / 2);
      const outerB = outerMid.clone().addScaledVector(dir, length / 2);

      const cubeCenter = mid.clone().add(shift);

      return { outerA, outerB, length, dir, ortho1, ortho2, cubeCenter };
    }

    function buildTetraOnCube(cD, volume, colorRGB, opacity = 1.0, stretchFactor = 1.35, breakAllEdges = false) {
      let currentOuterA = cD.outerA.clone();
      let currentOuterB = cD.outerB.clone();
      let currentLength = cD.length;

      if (breakAllEdges) {
        const edgeScaleFactor = 1.18; 
        currentLength = cD.length * edgeScaleFactor;
        const midOuter = new THREE.Vector3().addVectors(cD.outerA, cD.outerB).multiplyScalar(0.5);
        currentOuterA = midOuter.clone().addScaledVector(cD.dir, -currentLength / 2);
        currentOuterB = midOuter.clone().addScaledVector(cD.dir, currentLength / 2);
      }

      const d1 = currentLength * stretchFactor;
      
      const midOuterCurrent = new THREE.Vector3().addVectors(currentOuterA, currentOuterB).multiplyScalar(0.5);
      const toCubeCenter = new THREE.Vector3().subVectors(cD.cubeCenter, midOuterCurrent);

      let ortho1Dir = cD.ortho1.clone();
      let tetraP3_test = currentOuterA.clone().addScaledVector(cD.dir, currentLength / 2).addScaledVector(ortho1Dir, d1);
      if (new THREE.Vector3().subVectors(tetraP3_test, midOuterCurrent).dot(toCubeCenter) > 0) {
        ortho1Dir.multiplyScalar(-1);
      }
      let tetraP3 = currentOuterA.clone().addScaledVector(cD.dir, currentLength / 2).addScaledVector(ortho1Dir, d1);

      let ortho2Dir = cD.ortho2.clone();
      let tetraP4_test = currentOuterA.clone().addScaledVector(cD.dir, currentLength / 2).addScaledVector(ortho2Dir, 1.0);
      if (new THREE.Vector3().subVectors(tetraP4_test, midOuterCurrent).dot(toCubeCenter) > 0) {
        ortho2Dir.multiplyScalar(-1);
      }

      // Volumen-Grundformel
      let height = (6 * volume) / (currentLength * d1);
      
      // ECHTE 45° NEIGUNG: Wir nehmen den exakten Richtungsvektor nach oben (ortho2Dir) und kippen ihn 
      // durch eine präzise lineare Addition der Flächen-Achse (ortho1Dir) um exakt 45 Grad flach nach unten.
      let heightDir = new THREE.Vector3().addVectors(ortho2Dir, ortho1Dir).normalize();
      
      // Da der Vektor nun schräg steht, dehnen wir die projizierte Höhe um Wurzel 2 aus,
      // damit der senkrechte Abstand zur Grundfläche absolut formtreu das Volumen bewahrt.
      let adjustedHeight = height * Math.sqrt(2);

      let tetraP4 = currentOuterA.clone().addScaledVector(cD.dir, currentLength / 2).addScaledVector(heightDir, adjustedHeight);

      createTetraMesh([
        [currentOuterA.x, currentOuterA.y, currentOuterA.z],
        [currentOuterB.x, currentOuterB.y, currentOuterB.z],
        [tetraP3.x, tetraP3.y, tetraP3.z],
        [tetraP4.x, tetraP4.y, tetraP4.z]
      ], colorRGB, opacity);

      const nextCentroid = getCentroid(currentOuterA, currentOuterB, tetraP3, tetraP4);

      return { tetraP3, tetraP4, nextCentroid };
    }

    function initCascade() {
      dynamicMeshes.forEach(mesh => { scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); });
      dynamicMeshes = [];
      animationQueue = [];
      resetTimer = null;

      cycleCount++;

      let vP1, vP2, vP3, vP4;

      if (cycleCount === 1) {
        vP1 = new THREE.Vector3(0.0, 1.4, 0.2);
        vP2 = new THREE.Vector3(-1.6, -0.5, 0.1);
        vP3 = new THREE.Vector3(1.3, -0.9, -0.6);
        vP4 = new THREE.Vector3(0.4, -0.1, 1.7);
        targetUrVolume = tetraVolume(vP1, vP2, vP3, vP4);
      } else {
        const rL1 = 1.5 + Math.random() * 1.5;
        const rL2 = 1.5 + Math.random() * 1.5;
        const angle = (Math.PI / 6) + Math.random() * (Math.PI / 3);

        vP1 = new THREE.Vector3(0, 0, 0);
        vP2 = new THREE.Vector3(rL1, 0, 0);
        vP3 = new THREE.Vector3(rL2 * Math.cos(angle), rL2 * Math.sin(angle), Math.random() * 0.5 - 0.25);

        const baseTriangleArea = new THREE.Vector3().crossVectors(
          new THREE.Vector3().subVectors(vP2, vP1),
          new THREE.Vector3().subVectors(vP3, vP1)
        ).length() * 0.5;

        const exactHeight = (3 * targetUrVolume) / baseTriangleArea;
        const normalDir = new THREE.Vector3().crossVectors(
          new THREE.Vector3().subVectors(vP2, vP1),
          new THREE.Vector3().subVectors(vP3, vP1)
        ).normalize();

        const midBase = new THREE.Vector3().add(vP1).add(vP2).add(vP3).multiplyScalar(1/3);
        vP4 = midBase.clone().addScaledVector(normalDir, exactHeight);
      }

      const urCentroid = getCentroid(vP1, vP2, vP3, vP4);
      createTetraMesh([[vP1.x, vP1.y, vP1.z], [vP2.x, vP2.y, vP2.z], [vP3.x, vP3.y, vP3.z], [vP4.x, vP4.y, vP4.z]], 0xffffff, 1.0);

      const urEdges = [
        [vP1, vP2], [vP1, vP3], [vP1, vP4],
        [vP2, vP3], [vP2, vP4], [vP3, vP4]
      ];

      urEdges.forEach((edge, index) => {
        animationQueue.push({ type: 'CUBE_GEN1', edgeIndex: index, data: { a: edge[0], b: edge[1], volume: targetUrVolume, parentCentroid: urCentroid.clone() } });
      });
    }

    function executeNextCascadeStep() {
      if (animationQueue.length === 0) return;
      const step = animationQueue.shift();

      if (step.type === 'CUBE_GEN1') {
        const cubeData = buildCubeOnEdge(step.data.a, step.data.b, step.data.parentCentroid, 0xff8800, 0.3);
        animationQueue.push({ type: 'TETRA_GEN2', edgeIndex: step.edgeIndex, data: { cubeData, volume: step.data.volume } });

      } else if (step.type === 'TETRA_GEN2') {
        // Gen 2 Tetraeder: Reines Grün
        const tetraData = buildTetraOnCube(step.data.cubeData, step.data.volume, 0x00ff66, 0.6, 1.35, false);
        animationQueue.push({ type: 'CUBE_GEN2', edgeIndex: step.edgeIndex, data: { a: tetraData.tetraP3, b: tetraData.tetraP4, volume: step.data.volume, parentCentroid: tetraData.nextCentroid } });

      } else if (step.type === 'CUBE_GEN2') {
        // Gen 2 Kubus: Orange/Rot-Kombination fest
        const cubeData = buildCubeOnEdge(step.data.a, step.data.b, step.data.parentCentroid, 0xff4444, 0.6);
        animationQueue.push({ type: 'TETRA_GEN3', edgeIndex: step.edgeIndex, data: { cubeData, volume: step.data.volume } });

      } else if (step.type === 'TETRA_GEN3') {
        // Gen 3 Tetraeder: Übersetztes Grün (Cyan-Nuance)
        const tetraData = buildTetraOnCube(step.data.cubeData, step.data.volume, 0x00ffcc, 0.8, 1.2, true);
        animationQueue.push({ type: 'CUBE_GEN3', edgeIndex: step.edgeIndex, data: { a: tetraData.tetraP3, b: tetraData.tetraP4, volume: step.data.volume, parentCentroid: tetraData.nextCentroid } });

      } else if (step.type === 'CUBE_GEN3') {
        // Kubus ab Gen 3: Absolutes RNG Farb-Protokoll!
        const cubeData = buildCubeOnEdge(step.data.a, step.data.b, step.data.parentCentroid, getRandomColor(), 0.7);
        animationQueue.push({ type: 'TETRA_GEN4', edgeIndex: step.edgeIndex, data: { cubeData, volume: step.data.volume } });

      } else if (step.type === 'TETRA_GEN4') {
        // Gen 4 Tetraeder: Übersetztes Grün (Smaragd-Nuance)
        const tetraData = buildTetraOnCube(step.data.cubeData, step.data.volume, 0x00cc44, 1.0, 1.15, true);
        animationQueue.push({ type: 'CUBE_GEN4', edgeIndex: step.edgeIndex, data: { a: tetraData.tetraP3, b: tetraData.tetraP4, volume: step.data.volume, parentCentroid: tetraData.nextCentroid } });

      } else if (step.type === 'CUBE_GEN4') {
        // Kubus Gen 4: Ebenfalls RNG Farb-Protokoll!
        buildCubeOnEdge(step.data.a, step.data.b, step.data.parentCentroid, getRandomColor(), 0.8);
      }
    }

    initCascade();
    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      if (time - lastExecutionTime > 0.3) {
        if (animationQueue.length > 0) {
          executeNextCascadeStep();
          lastExecutionTime = time;
        } else {
          if (resetTimer === null) {
            resetTimer = time + 5.0;
          }
          if (time > resetTimer) {
            initCascade();
          }
        }
      }

      const radius = 38; 
      camera.position.x = Math.cos(time * 0.12) * radius;
      camera.position.z = Math.sin(time * 0.12) * radius;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

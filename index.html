<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kubus-Kaskade – RVT v16 (Kantenbasierte Kaskade)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="info">
    Kubus-Kaskade (RVT v16) – Kantenbasierte Kaskade<br/>
    Ur-Tetraeder (gelb) → Kuben (orange, Transparenz: 0.3)<br/>
    Folge-Tetraeder (grün) → Neue Kuben (blau, Transparenz: 0.3)
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 2.5, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    function createTetra(points, color = 0xffcc00, opacity = 0.9) {
      const geom = new THREE.BufferGeometry();
      const vertices = new Float32Array([
        ...points[0], ...points[1], ...points[2],
        ...points[0], ...points[1], ...points[3],
        ...points[0], ...points[2], ...points[3],
        ...points[1], ...points[2], ...points[3],
      ]);
      geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geom.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geom, mat);
      scene.add(mesh);
      return { mesh, points };
    }

    function getOrthogonalVector(v) {
      const ortho = new THREE.Vector3();
      if (Math.abs(v.x) < 0.5) {
        ortho.set(1, 0, 0);
      } else if (Math.abs(v.y) < 0.5) {
        ortho.set(0, 1, 0);
      } else {
        ortho.set(0, 0, 1);
      }
      return ortho.cross(v).normalize();
    }

    function createCubeEdgesFromTetraEdge(pA, pB, color = 0xff8800, opacity = 0.3) {
      const vA = new THREE.Vector3(...pA);
      const vB = new THREE.Vector3(...pB);
      const edge = new THREE.Vector3().subVectors(vB, vA);
      const length = edge.length();

      const cubeGeom = new THREE.BoxGeometry(length, length, length);
      const edgesGeom = new THREE.EdgesGeometry(cubeGeom);
      const cubeMat = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity,
      });
      const cube = new THREE.LineSegments(edgesGeom, cubeMat);

      const mid = new THREE.Vector3().addVectors(vA, vB).multiplyScalar(0.5);
      cube.position.copy(mid);

      const dir = edge.clone().normalize();
      const quat = new THREE.Quaternion().setFromUnitVectors(
        new THREE.Vector3(1, 0, 0),
        dir
      );
      cube.quaternion.copy(quat);

      scene.add(cube);
      return { cube, vA, vB, length, dir, mid };
    }

    function tetraVolume(a, b, c, d) {
      const ab = new THREE.Vector3().subVectors(b, a);
      const ac = new THREE.Vector3().subVectors(c, a);
      const ad = new THREE.Vector3().subVectors(d, a);
      return Math.abs(ab.dot(ac.cross(ad))) / 6;
    }

    const P1 = [0.0, 1.4, 0.2];
    const P2 = [-1.6, -0.5, 0.1];
    const P3 = [1.3, -0.9, -0.6];
    const P4 = [0.4, -0.1, 1.7];

    const urTetra = createTetra([P1, P2, P3, P4], 0xffcc00, 1.0);
    const urVolume = tetraVolume(
      new THREE.Vector3(...P1),
      new THREE.Vector3(...P2),
      new THREE.Vector3(...P3),
      new THREE.Vector3(...P4)
    );
    console.log(`Volumen des Ur-Tetraeders: ${urVolume.toFixed(3)}`);

    const edges = [
      [P1, P2],
      [P1, P3],
      [P1, P4],
      [P2, P3],
      [P2, P4],
      [P3, P4],
    ];

    console.log("Kantenlängen des Ur-Tetraeders:");
    edges.forEach(([a, b], i) => {
      const vA = new THREE.Vector3(...a);
      const vB = new THREE.Vector3(...b);
      const len = vA.distanceTo(vB);
      console.log(`Kante ${i+1}: Länge = ${len.toFixed(3)}`);
    });

    let cubeEdges = [];
    let folgeTetraeder = [];
    let nextCubeEdges = [];
    let step = 0;
    let time = 0;
    let lastSpawnTime = 0;

    function spawnNextCube() {
      if (step >= edges.length) {
        spawnNextTetraederAndCube();
        return;
      }

      const [a, b] = edges[step];
      const cubeEdge = createCubeEdgesFromTetraEdge(a, b, 0xff8800, 0.3);
      cubeEdges.push(cubeEdge);
      step++;
      lastSpawnTime = time;
    }

    function spawnNextTetraederAndCube() {
      if (step >= edges.length + 1) return;

      cubeEdges.forEach((cubeEdge, i) => {
        const { vA, vB, length, dir, mid } = cubeEdge;
        const normal = getOrthogonalVector(dir);

        const outerEdgeLength = length;
        const outerEdgeDir = dir.clone();
        const outerEdgeMid = mid.clone().add(outerEdgeDir.multiplyScalar(length / 2));

        const baseArea = outerEdgeLength * outerEdgeLength;
        const height = (3 * urVolume) / baseArea;

        const P3p = outerEdgeMid.clone().add(normal.clone().multiplyScalar(outerEdgeLength * 0.5));
        const P4p = outerEdgeMid.clone().add(normal.clone().multiplyScalar(-outerEdgeLength * 0.5)).add(new THREE.Vector3(0, height, 0));

        const folgeTetra = createTetra(
          [
            [vA.x, vA.y, vA.z],
            [vB.x, vB.y, vB.z],
            [P3p.x, P3p.y, P3p.z],
            [P4p.x, P4p.y, P4p.z],
          ],
          0x66ff66,
          0.7
        );
        folgeTetraeder.push(folgeTetra);

        const folgeVolume = tetraVolume(vA, vB, P3p, P4p);
        console.log(`Volumen des Folge-Tetraeders ${i+1}: ${folgeVolume.toFixed(3)} (Ziel: ${urVolume.toFixed(3)})`);

        const newCubeEdge = createCubeEdgesFromTetraEdge(
          [P3p.x, P3p.y, P3p.z],
          [P4p.x, P4p.y, P4p.z],
          0x0088ff,
          0.3
        );
        nextCubeEdges.push(newCubeEdge);
      });

      step++;
      lastSpawnTime = time;
    }

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      if (time - lastSpawnTime > 1 && step < edges.length) {
        spawnNextCube();
      }

      if (step === edges.length && time - lastSpawnTime > 1) {
        spawnNextTetraederAndCube();
      }

      const radius = 15;
      camera.position.x = Math.cos(time * 0.3) * radius;
      camera.position.z = Math.sin(time * 0.3) * radius;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

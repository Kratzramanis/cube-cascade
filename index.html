<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kubus-Kaskade – RVT v16 (Dynamische Zyklen-Asymmetrie)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.8);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.4;
      border: 1px solid #334;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info">
    <strong>RVT v16 – Zyklische Kanten-Disjunktion</strong><br/>
    • Taktung: Exakt 0.8 Sekunden pro Einzelelement (Beschleunigt).<br/>
    • Rotation: Verdoppelt auf Basis-Faktor 0.9.<br/>
    • Dynamische Phasen: Deterministische Verschiebung pro Generation durch laufende Zyklen.
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(20, 40, 30);
    scene.add(dirLight);

    let dynamicMeshes = [];
    let animationQueue = [];
    
    let rotationAngle = 0;
    let isBuilding = true;
    
    const START_RADIUS = 6.0;      
    const MAX_ZOOM_RADIUS = 320.0;  
    let currentRadius = START_RADIUS;
    
    let timeActiveTotal = 0;
    let timeSinceLastStep = 0;
    let timeSinceBuildEnd = 0;
    
    // ANPASSUNG 1: Taktung von 1.5s auf 0.8s reduziert
    const ELEMENT_STEP_DURATION = 0.8; 
    const totalStepsInCycle = 54; 
    const TOTAL_BUILD_DURATION = totalStepsInCycle * ELEMENT_STEP_DURATION; 

    const resetTimer = 15.0;       
    let cycleCount = 0; 

    function generateTetraEdgeColors(baseEdgeColor) {
      if (baseEdgeColor === 0xff0000) {
        return { 
          "0-1": 0x0000ff, "0-2": 0x0000ff, "1-2": 0xff0000, 
          "0-3": 0xff0000, "1-3": 0x0000ff, "2-3": 0xff0000  
        };
      } else {
        return { 
          "0-1": 0xff0000, "0-2": 0xff0000, "1-2": 0x0000ff, 
          "0-3": 0x0000ff, "1-3": 0xff0000, "2-3": 0x0000ff  
        };
      }
    }

    function createColoredTetra(points, baseEdgeColor, opacity = 0.45) {
      const p = points.map(pt => new THREE.Vector3(...pt));
      const kantenMuster = generateTetraEdgeColors(baseEdgeColor);

      function getLocalKantenFarbe(i1, i2) {
        const key = i1 < i2 ? `${i1}-${i2}` : `${i2}-${i1}`;
        return kantenMuster[key];
      }

      const flächenDefinitionen = [
        { Indizes: [0, 1, 2], pts: [p[0], p[1], p[2]] },
        { Indizes: [0, 1, 3], pts: [p[0], p[1], p[3]] },
        { Indizes: [0, 2, 3], pts: [p[0], p[2], p[3]] },
        { Indizes: [1, 2, 3], pts: [p[1], p[2], p[3]] }
      ];

      flächenDefinitionen.forEach(f => {
        const c1 = getLocalKantenFarbe(f.Indizes[0], f.Indizes[1]);
        const c2 = getLocalKantenFarbe(f.Indizes[0], f.Indizes[2]);
        const c3 = getLocalKantenFarbe(f.Indizes[1], f.Indizes[2]);

        let r = 0, b = 0;
        [c1, c2, c3].forEach(c => {
          if (c === 0xff0000) r += 85;
          if (c === 0x0000ff) b += 85;
        });
        const mixedHex = (r << 16) | (0x11 << 8) | b;

        const geom = new THREE.BufferGeometry();
        const vertices = new Float32Array([
          f.pts[0].x, f.pts[0].y, f.pts[0].z,
          f.pts[1].x, f.pts[1].y, f.pts[1].z,
          f.pts[2].x, f.pts[2].y, f.pts[2].z
        ]);
        geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        geom.computeVertexNormals();

        const mat = new THREE.MeshPhongMaterial({
          color: mixedHex, transparent: true, opacity: opacity, side: THREE.DoubleSide, depthWrite: false
        });
        const mesh = new THREE.Mesh(geom, mat);
        scene.add(mesh);
        dynamicMeshes.push(mesh);
      });

      const kantenPaare = [
        [0, 1], [0, 2], [1, 2], [0, 3], [1, 3], [2, 3]
      ];

      grid = kantenPaare.forEach(paar => {
        const col = getLocalKantenFarbe(paar[0], paar[1]);
        const lineGeom = new THREE.BufferGeometry().setFromPoints([p[paar[0]], p[paar[1]]]);
        const lineMat = new THREE.LineBasicMaterial({ color: col, linewidth: 2 });
        const line = new THREE.Line(lineGeom, lineMat);
        scene.add(line);
        dynamicMeshes.push(line);
      });

      return kantenMuster;
    }

    function tetraVolume(a, b, c, d) {
      const ab = new THREE.Vector3().subVectors(b, a);
      const ac = new THREE.Vector3().subVectors(c, a);
      const ad = new THREE.Vector3().subVectors(d, a);
      return Math.abs(ab.dot(ac.cross(ad))) / 6;
    }

    function getTriangleArea(p1, p2, p3) {
      const v1 = new THREE.Vector3().subVectors(p2, p1);
      const v2 = new THREE.Vector3().subVectors(p3, p1);
      return new THREE.Vector3().crossVectors(v1, v2).length() * 0.5;
    }

    function buildCubeOnEdgeAligned(pA, pB, referenceNormal, colorRGB, opacity = 0.55, invertAngle = false) {
      const edgeVec = new THREE.Vector3().subVectors(pB, pA);
      const length = edgeVec.length();
      const dir = edgeVec.clone().normalize();

      const projNormal = referenceNormal.clone().addScaledVector(dir, -referenceNormal.dot(dir)).normalize();
      const ortho2 = new THREE.Vector3().crossVectors(dir, projNormal).normalize();

      const geom = new THREE.BoxGeometry(length, length, length);
      const mat = new THREE.MeshPhongMaterial({ color: colorRGB, transparent: true, opacity: opacity });
      const cube = new THREE.Mesh(geom, mat);

      const angle = invertAngle ? -Math.PI / 4 : Math.PI / 4; 
      const finalNormal = projNormal.clone().multiplyScalar(Math.cos(angle)).add(ortho2.clone().multiplyScalar(Math.sin(angle))).normalize();
      const finalOrtho2 = new THREE.Vector3().crossVectors(dir, finalNormal).normalize();

      const matrix = new THREE.Matrix4().makeBasis(dir, finalNormal, finalOrtho2);
      cube.quaternion.setFromRotationMatrix(matrix);

      const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
      const shift = finalNormal.clone().multiplyScalar(length / 2).addScaledVector(finalOrtho2, length / 2);
      cube.position.copy(mid).add(shift);
      
      scene.add(cube);
      dynamicMeshes.push(cube);

      const outerMid = mid.clone().add(shift.clone().multiplyScalar(2));
      const outerA = outerMid.clone().addScaledVector(dir, -length / 2);
      const outerB = outerMid.clone().addScaledVector(dir, length / 2);

      return { outerA, outerB, length, dir, ortho1: finalNormal, ortho2: finalOrtho2 };
    }

    function initCascade() {
      dynamicMeshes.forEach(mesh => { scene.remove(mesh); if(mesh.geometry) mesh.geometry.dispose(); if(mesh.material) mesh.material.dispose(); });
      dynamicMeshes = [];
      animationQueue = [];
      
      rotationAngle = 0;
      isBuilding = true;
      timeActiveTotal = 0;
      timeSinceLastStep = 0;
      timeSinceBuildEnd = 0;
      currentRadius = START_RADIUS;

      cycleCount++;

      // Ur-Tetraeder bleibt als geometrische Konstante gleich
      let P1 = [0.0, 2.5, 0.4];
      let P2 = [-2.5, -1.0, 0.0];
      let P3 = [2.5, -1.5, -0.8];
      let P4 = [0.4, -0.5, 2.8];

      const vP1 = new THREE.Vector3(...P1);
      const vP2 = new THREE.Vector3(...P2);
      const vP3 = new THREE.Vector3(...P3);
      const vP4 = new THREE.Vector3(...P4);

      const urVolume = tetraVolume(vP1, vP2, vP3, vP4);
      
      const initialMap = createColoredTetra([P1, P2, P3, P4], 0xff0000, 0.5);

      const faces = [
        { pts: [vP1, vP2, vP3], area: getTriangleArea(vP1, vP2, vP3) },
        { pts: [vP1, vP2, vP4], area: getTriangleArea(vP1, vP2, vP4) },
        { pts: [vP1, vP3, vP4], area: getTriangleArea(vP1, vP3, vP4) },
        { pts: [vP2, vP3, vP4], area: getTriangleArea(vP2, vP3, vP4) }
      ];

      const urEdges = [
        { pts: [vP1, vP2], key: "0-1" },
        { pts: [vP1, vP3], key: "0-2" },
        { pts: [vP1, vP4], key: "0-3" },
        { pts: [vP2, vP3], key: "1-2" },
        { pts: [vP2, vP4], key: "1-3" },
        { pts: [vP3, vP4], key: "2-3" }
      ];

      urEdges.forEach((edge, index) => {
        let neighborFaces = faces.filter(f => f.pts.includes(edge.pts[0]) && f.pts.includes(edge.pts[1]));
        let targetFace = neighborFaces[0];
        if (neighborFaces[1] && neighborFaces[1].area < neighborFaces[0].area) {
          targetFace = neighborFaces[1];
        }

        const va = new THREE.Vector3().subVectors(targetFace.pts[1], targetFace.pts[0]);
        const vb = new THREE.Vector3().subVectors(targetFace.pts[2], targetFace.pts[0]);
        const normal = new THREE.Vector3().crossVectors(va, vb).normalize();
        
        const kantenFarbe = initialMap[edge.key];

        animationQueue.push({ 
          type: 'CUBE_GEN1', 
          edgeIndex: index, 
          data: { a: edge.pts[0], b: edge.pts[1], volume: urVolume, normal: normal, color: kantenFarbe } 
        });
      });

      executeNextCascadeStep();
    }

    function executeNextCascadeStep() {
      if (animationQueue.length === 0) return;
      const step = animationQueue.shift();

      // ANPASSUNG 3: Einbindung von 'cycleCount' in alle Tetraeder-Phasen, um das Modell pro Zyklus kontrolliert zu morphen.
      if (step.type === 'CUBE_GEN1') {
        const cubeData = buildCubeOnEdgeAligned(step.data.a, step.data.b, step.data.normal, step.data.color, 0.45, false);
        animationQueue.push({ type: 'TETRA_GEN2', edgeIndex: step.edgeIndex, data: { ...cubeData, volume: step.data.volume, color: step.data.color } });

      } else if (step.type === 'TETRA_GEN2') {
        const cD = step.data;
        const idx = step.edgeIndex; 
        
        const vec45_A = new THREE.Vector3().addVectors(cD.ortho1, cD.ortho2).normalize();
        const vec45_B = new THREE.Vector3().subVectors(cD.ortho1, cD.ortho2).normalize();
        
        // Verschiebung über cycleCount mod 7 verhindert extremes Wachstum, sichert aber Phasenwechsel
        const cycleShift = (cycleCount % 7) * 0.04; 
        const d1 = cD.length * (1.10 + idx * 0.08 + cycleShift); 
        const height = ((6 * cD.volume) / (cD.length * d1)) * (0.75 - idx * 0.04);
        
        const shiftAsym = cD.dir.clone().multiplyScalar(cD.length * (0.05 + idx * 0.03));

        const tetraP3 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).add(shiftAsym).addScaledVector(vec45_A, d1);
        const tetraP4 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).sub(shiftAsym).addScaledVector(vec45_B, height);

        createColoredTetra([[tetraP3.x, tetraP3.y, tetraP3.z], [tetraP4.x, tetraP4.y, tetraP4.z], [cD.outerA.x, cD.outerA.y, cD.outerA.z], [cD.outerB.x, cD.outerB.y, cD.outerB.z]], cD.color, 0.35);
        
        let nextCubeColor = (cD.color === 0xff0000) ? 0x0000ff : 0xff0000;
        animationQueue.push({ type: 'CUBE_GEN2', edgeIndex: idx, data: { a: tetraP3, b: tetraP4, volume: cD.volume, normal: vec45_A, color: nextCubeColor } });

      } else if (step.type === 'CUBE_GEN2') {
        const cubeData = buildCubeOnEdgeAligned(step.data.a, step.data.b, step.data.normal, step.data.color, 0.5, true);
        animationQueue.push({ type: 'TETRA_GEN3', edgeIndex: step.edgeIndex, data: { ...cubeData, volume: step.data.volume, color: step.data.color } });

      } else if (step.type === 'TETRA_GEN3') {
        const cD = step.data;
        const idx = step.edgeIndex;
        
        const vec45_A = new THREE.Vector3().addVectors(cD.ortho1, cD.ortho2).normalize();
        const vec45_B = new THREE.Vector3().subVectors(cD.ortho1, cD.ortho2).normalize();
        
        const cycleShift = (cycleCount % 7) * 0.03;
        const d1 = cD.length * (1.08 + idx * 0.05 + cycleShift); 
        const height = ((6 * cD.volume) / (cD.length * d1)) * (0.80 - idx * 0.03);
        const shiftAsym = cD.dir.clone().multiplyScalar(cD.length * (0.04 + idx * 0.02));

        const tetraP3 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).add(shiftAsym).addScaledVector(vec45_A, d1);
        const tetraP4 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).sub(shiftAsym).addScaledVector(vec45_B, height);

        createColoredTetra([[tetraP3.x, tetraP3.y, tetraP3.z], [tetraP4.x, tetraP4.y, tetraP4.z], [cD.outerA.x, cD.outerA.y, cD.outerA.z], [cD.outerB.x, cD.outerB.y, cD.outerB.z]], cD.color, 0.3);
        
        let nextCubeColor = (cD.color === 0xff0000) ? 0x0000ff : 0xff0000;
        animationQueue.push({ type: 'CUBE_GEN3', edgeIndex: idx, data: { a: tetraP3, b: tetraP4, volume: cD.volume, normal: vec45_A, color: nextCubeColor } });

      } else if (step.type === 'CUBE_GEN3') {
        const cubeData = buildCubeOnEdgeAligned(step.data.a, step.data.b, step.data.normal, step.data.color, 0.55, true);
        animationQueue.push({ type: 'TETRA_GEN4', edgeIndex: step.edgeIndex, data: { ...cubeData, volume: step.data.volume, color: step.data.color } });

      } else if (step.type === 'TETRA_GEN4') {
        const cD = step.data;
        const idx = step.edgeIndex;
        
        const vec45_A = new THREE.Vector3().addVectors(cD.ortho1, cD.ortho2).normalize();
        const vec45_B = new THREE.Vector3().subVectors(cD.ortho1, cD.ortho2).normalize();
        
        const cycleShift = (cycleCount % 7) * 0.02;
        const d1 = cD.length * (1.05 + idx * 0.03 + cycleShift);
        const height = ((6 * cD.volume) / (cD.length * d1)) * (0.85 - idx * 0.02);
        const shiftAsym = cD.dir.clone().multiplyScalar(cD.length * (0.03 + idx * 0.01));

        const tetraP3 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).add(shiftAsym).addScaledVector(vec45_A, d1);
        const tetraP4 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).sub(shiftAsym).addScaledVector(vec45_B, height);

        createColoredTetra([[tetraP3.x, tetraP3.y, tetraP3.z], [tetraP4.x, tetraP4.y, tetraP4.z], [cD.outerA.x, cD.outerA.y, cD.outerA.z], [cD.outerB.x, cD.outerB.y, cD.outerB.z]], cD.color, 0.25);
        
        let nextCubeColor = (cD.color === 0xff0000) ? 0x0000ff : 0xff0000;
        animationQueue.push({ type: 'CUBE_GEN4', edgeIndex: idx, data: { a: tetraP3, b: tetraP4, volume: cD.volume, normal: vec45_A, color: nextCubeColor } });

      } else if (step.type === 'CUBE_GEN4') {
        const cubeData = buildCubeOnEdgeAligned(step.data.a, step.data.b, step.data.normal, step.data.color, 0.6, true);
        animationQueue.push({ type: 'TETRA_GEN5', edgeIndex: step.edgeIndex, data: { ...cubeData, volume: step.data.volume, color: step.data.color } });

      } else if (step.type === 'TETRA_GEN5') {
        const cD = step.data;
        const idx = step.edgeIndex;
        
        const vec45_A = new THREE.Vector3().addVectors(cD.ortho1, cD.ortho2).normalize();
        const vec45_B = new THREE.Vector3().subVectors(cD.ortho1, cD.ortho2).normalize();
        
        const cycleShift = (cycleCount % 7) * 0.01;
        const d1 = cD.length * (1.02 + idx * 0.01 + cycleShift);
        const height = (6 * cD.volume) / (cD.length * d1);

        const tetraP3 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).addScaledVector(vec45_A, d1);
        const tetraP4 = cD.outerA.clone().addScaledVector(cD.dir, cD.length / 2).addScaledVector(vec45_B, height);

        createColoredTetra([[tetraP3.x, tetraP3.y, tetraP3.z], [tetraP4.x, tetraP4.y, tetraP4.z], [cD.outerA.x, cD.outerA.y, cD.outerA.z], [cD.outerB.x, cD.outerB.y, cD.outerB.z]], cD.color, 0.2);
        
        let nextCubeColor = (cD.color === 0xff0000) ? 0x0000ff : 0xff0000;
        animationQueue.push({ type: 'CUBE_GEN5', edgeIndex: idx, data: { a: tetraP3, b: tetraP4, volume: cD.volume, normal: vec45_A, color: nextCubeColor } });

      } else if (step.type === 'CUBE_GEN5') {
        buildCubeOnEdgeAligned(step.data.a, step.data.b, step.data.normal, step.data.color, 0.65, true);
      }
    }

    initCascade();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      // ANPASSUNG 2: Rotationsgeschwindigkeit von 0.45 auf 0.9 verdoppelt
      rotationAngle += delta * 0.9; 

      if (isBuilding) {
        timeSinceLastStep += delta;
        timeActiveTotal += delta;

        if (timeSinceLastStep >= ELEMENT_STEP_DURATION) {
          if (animationQueue.length > 0) {
            executeNextCascadeStep();
            timeSinceLastStep = 0;
          } else {
            isBuilding = false;
          }
        }

        const progressFactor = Math.min(timeActiveTotal / TOTAL_BUILD_DURATION, 1.0);
        const slowedProgress = Math.pow(progressFactor, 1.5); 
        
        currentRadius = START_RADIUS + slowedProgress * (MAX_ZOOM_RADIUS - START_RADIUS);

      } else {
        timeSinceBuildEnd += delta;
        currentRadius = MAX_ZOOM_RADIUS; 

        if (timeSinceBuildEnd > resetTimer) initCascade();
      }

      camera.position.x = Math.sin(rotationAngle) * currentRadius;
      camera.position.z = Math.cos(rotationAngle) * currentRadius;
      
      camera.position.y = 3.0 + (currentRadius - START_RADIUS) * 0.15; 
      camera.lookAt(0, 1.5, 0);

      renderer.render(scene, camera);
    }

    clock.start();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kubus-Kaskade – RVT v16 (Volumetrische Kaskade)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="info">
    Kubus-Kaskade (RVT v16) – Volumetrische Kaskade<br/>
    Ur-Tetraeder (gelb) → Kuben (orange, massiv, Transparenz: 0.3)<br/>
    Folge-Tetraeder (grün) → Kuben Gen 2 (blau, massiv, Transparenz: 0.3)<br/>
    Volumen-Invarianz: Aktiv (Identisches Volumen, asymmetrische Kanten)
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(10, 20, 15);
    scene.add(dirLight);

    function createTetra(points, color, opacity) {
      const geom = new THREE.BufferGeometry();
      const vertices = new Float32Array([
        ...points[0], ...points[1], ...points[2],
        ...points[0], ...points[1], ...points[3],
        ...points[0], ...points[2], ...points[3],
        ...points[1], ...points[2], ...points[3],
      ]);
      geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geom.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({
        color, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false
      });
      const mesh = new THREE.Mesh(geom, mat);
      scene.add(mesh);
      return mesh;
    }

    function getOrthogonalVector(v) {
      const ortho = new THREE.Vector3();
      if (Math.abs(v.x) < 0.5) ortho.set(1, 0, 0);
      else if (Math.abs(v.y) < 0.5) ortho.set(0, 1, 0);
      else ortho.set(0, 0, 1);
      return ortho.cross(v).normalize();
    }

    function tetraVolume(a, b, c, d) {
      const ab = new THREE.Vector3().subVectors(b, a);
      const ac = new THREE.Vector3().subVectors(c, a);
      const ad = new THREE.Vector3().subVectors(d, a);
      return Math.abs(ab.dot(ac.cross(ad))) / 6;
    }

    // RVT v16 Ur-Koordinaten
    const P1 = [0.0, 1.4, 0.2];
    const P2 = [-1.6, -0.5, 0.1];
    const P3 = [1.3, -0.9, -0.6];
    const P4 = [0.4, -0.1, 1.7];

    const vP1 = new THREE.Vector3(...P1);
    const vP2 = new THREE.Vector3(...P2);
    const vP3 = new THREE.Vector3(...P3);
    const vP4 = new THREE.Vector3(...P4);

    createTetra([P1, P2, P3, P4], 0xffcc00, 0.9);
    const urVolume = tetraVolume(vP1, vP2, vP3, vP4);
    console.log(`RVT-Referenz: Volumen des Ur-Tetraeders: ${urVolume.toFixed(3)}`);

    const initialEdges = [
      [vP1, vP2], [vP1, vP3], [vP1, vP4],
      [vP2, vP3], [vP2, vP4], [vP3, vP4],
    ];

    // Kaskaden-Warteschlangen
    let edgeQueue = [];
    let cubeQueue = [];
    initialEdges.forEach(e => edgeQueue.push({ a: e[0], b: e[1], gen: 0 }));

    let time = 0;
    let lastActionTime = 0;
    const MAX_GENERATIONS = 2; // Stoppt bei 2, um den Raum nicht zu überladen

    function spawnCubeFromEdge(edgeData) {
      const { a, b, gen } = edgeData;
      const edgeVec = new THREE.Vector3().subVectors(b, a);
      const length = edgeVec.length();
      const dir = edgeVec.clone().normalize();

      const ortho1 = getOrthogonalVector(dir);
      const ortho2 = new THREE.Vector3().crossVectors(dir, ortho1).normalize();

      const geom = new THREE.BoxGeometry(length, length, length);
      const mat = new THREE.MeshPhongMaterial({
        color: gen === 0 ? 0xff8800 : 0x0088ff,
        transparent: true,
        opacity: 0.3,
        depthWrite: false
      });
      const cube = new THREE.Mesh(geom, mat);

      // Rotation ausrichten
      const matrix = new THREE.Matrix4().makeBasis(dir, ortho1, ortho2);
      cube.quaternion.setFromRotationMatrix(matrix);

      // Kubus so verschieben, dass seine Kante exakt auf a->b liegt
      const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      const shift = new THREE.Vector3()
        .addScaledVector(ortho1, length / 2)
        .addScaledVector(ortho2, length / 2);
      cube.position.copy(mid).add(shift);
      
      scene.add(cube);

      // Äußerste Kante des Kubus berechnen (Basis für den nächsten Tetraeder)
      const outerMid = mid.clone().add(shift.clone().multiplyScalar(2));
      const outerA = outerMid.clone().addScaledVector(dir, -length / 2);
      const outerB = outerMid.clone().addScaledVector(dir, length / 2);

      cubeQueue.push({ outerA, outerB, length, dir, ortho1, ortho2, gen });
    }

    function spawnTetraFromCube(cubeData) {
      const { outerA, outerB, length, dir, ortho1, ortho2, gen } = cubeData;

      // Asymmetrische Formgebung bei exaktem Volumen
      const stretchBase = 1.4; // Verändert die Kantenlänge drastisch
      const d1 = length * stretchBase;
      const P3p = outerA.clone()
        .addScaledVector(dir, length / 2)
        .addScaledVector(ortho1, d1);

      // Höhe d2 dynamisch berechnen für absolute Volumen-Invarianz: V = 1/6 * L * d1 * d2
      const d2 = (6 * urVolume) / (length * d1);
      const P4p = outerA.clone()
        .addScaledVector(dir, length / 2)
        .addScaledVector(ortho1, d1 / 3) // Leichte Scherung
        .addScaledVector(ortho2, d2);

      createTetra(
        [
          [outerA.x, outerA.y, outerA.z],
          [outerB.x, outerB.y, outerB.z],
          [P3p.x, P3p.y, P3p.z],
          [P4p.x, P4p.y, P4p.z]
        ],
        gen === 0 ? 0x66ff66 : 0xff33cc, // Grün für Gen 1, Pink für Gen 2
        0.7
      );

      const vol = tetraVolume(outerA, outerB, P3p, P4p);
      console.log(`Folge-Tetraeder Gen ${gen+1} erzeugt. Volumen: ${vol.toFixed(3)} | RVT-Symmetrie gewahrt.`);

      // Fünf neue Kanten an die Warteschlange übergeben (Basis-Kante wird ignoriert)
      const newEdges = [
        [outerA, P3p], [outerA, P4p],
        [outerB, P3p], [outerB, P4p],
        [P3p, P4p]
      ];
      
      newEdges.forEach(e => edgeQueue.push({ a: e[0], b: e[1], gen: gen + 1 }));
    }

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // Kontrollierte Kaskaden-Zündung (alle 0.4 Zeit-Vektoren)
      if (time - lastActionTime > 0.4) {
        if (edgeQueue.length > 0 && edgeQueue[0].gen < MAX_GENERATIONS) {
          spawnCubeFromEdge(edgeQueue.shift());
          lastActionTime = time;
        } else if (cubeQueue.length > 0 && cubeQueue[0].gen < MAX_GENERATIONS) {
          spawnTetraFromCube(cubeQueue.shift());
          lastActionTime = time;
        }
      }

      // Kamera-Flugbahn durch das RVT-Feld
      const radius = 25;
      camera.position.x = Math.cos(time * 0.2) * radius;
      camera.position.z = Math.sin(time * 0.2) * radius;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
